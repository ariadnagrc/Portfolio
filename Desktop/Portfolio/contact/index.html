<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | [Tu Nombre]</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav id="navbar">
        <div class="container">
            <a href="../index.html" class="logo">[Tu Nombre]</a>
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="../index.html#sobre-mi">Sobre mí</a></li>
                <li><a href="../projects/">Proyectos</a></li>
                <li><a href="../skills/">Habilidades</a></li>
                <li><a href="index.html" class="active">Contacto</a></li>
            </ul>
            <button class="menu-toggle" aria-label="Toggle menu">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <main class="contact-main">
        <section class="section">
            <div class="container">
                <h1 class="section-title">Contacto</h1>
                <p class="section-subtitle">¿Tienes un proyecto en mente? ¡Hablemos!</p>
                
                <div class="contact-content">
                    <div class="contact-info">
                        <div class="contact-info-item">
                            <i class="fas fa-envelope"></i>
                            <h3>Email</h3>
                            <p>tuemail@ejemplo.com</p>
                        </div>
                        <!-- Más información de contacto -->
                    </div>
                    
                    <form class="contact-form" id="contactForm">
                        <div class="form-group">
                            <input type="text" name="name" placeholder="Tu nombre" required>
                        </div>
                        <div class="form-group">
                            <input type="email" name="email" placeholder="Tu email" required>
                        </div>
                        <div class="form-group">
                            <input type="text" name="subject" placeholder="Asunto">
                        </div>
                        <div class="form-group">
                            <textarea name="message" placeholder="Tu mensaje" required></textarea>
                        </div>
                        <button type="submit" class="btn">Enviar Mensaje</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <!-- Similar al footer del index.html -->
    </footer>

    <script src="../js/contact.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
